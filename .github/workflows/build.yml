name: Auto Maven Build

on:
  workflow_dispatch:   # Можно запускать вручную
  push:
    branches:
      - main         # Или ваша ветка

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    - name: Get current version
      id: get_version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "Current version is $VERSION"
        echo "current_version=$VERSION" >> $GITHUB_OUTPUT

    - name: Bump version
      id: bump_version
      run: |
        CURRENT=${{ steps.get_version.outputs.current_version }}
        # Увеличиваем патч на 1
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        PATCH=$((PATCH+1))
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "New version: $NEW_VERSION"
        mvn versions:set -DnewVersion=$NEW_VERSION
        mvn versions:commit
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Build connector-plugin-base first
      run: |
        cd path/to/connector-plugin-base
        mvn clean install -B

    - name: Build entire project
      run: |
        mvn clean install -B -DskipTests

    - name: Archive JARs
      uses: actions/upload-artifact@v4
      with:
        name: Vienna-JARs
        path: |
          **/target/*.jar
